<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RateRadar — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;
  --surface:#141414;
  --surface2:#191919;
  --border:#232323;
  --orange:#ff6b1a;
  --orange-dim:rgba(255,107,26,.1);
  --orange-border:rgba(255,107,26,.25);
  --text:#f0ede8;
  --muted:#666;
  --green:#22c55e;
  --red:#ef4444;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;height:52px;gap:14px;position:sticky;top:0;z-index:100}
.logo{font-size:17px;font-weight:900;letter-spacing:-.4px;margin-right:auto;color:#fff}
.logo span{color:var(--orange)}
.trial-pill{background:var(--orange-dim);border:1px solid var(--orange-border);border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--orange)}
#sub-btn{background:var(--orange);color:#fff;font-weight:700;font-size:12px;border:none;border-radius:5px;padding:6px 14px;cursor:pointer;font-family:'Inter',sans-serif;transition:filter .15s}
#sub-btn:hover{filter:brightness(1.1)}
.nav-garage{font-size:13px;color:var(--muted);font-weight:500}
.nav-out{color:var(--muted);font-size:12px;text-decoration:none;transition:color .15s}
.nav-out:hover{color:var(--text)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 52px);overflow:hidden}

/* SIDEBAR */
.sidebar{width:260px;min-width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.alert-item{border-radius:8px;padding:12px;cursor:pointer;transition:background .15s;margin-bottom:2px;border:1px solid transparent}
.alert-item:hover{background:var(--surface2)}
.alert-item.active{background:var(--orange-dim);border-color:var(--orange-border)}
.alert-name{font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;gap:7px;margin-bottom:4px}
.a-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--green)}
.a-dot.off{background:#333}
.alert-meta{font-size:11px;color:var(--muted);padding-left:13px}
.alert-actions{display:flex;gap:6px;margin-top:8px;padding-left:13px}
.a-btn{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.a-btn:hover{border-color:#555;color:var(--text)}
.a-btn.del:hover{border-color:var(--red);color:var(--red)}
.sidebar-footer{padding:12px}
.new-alert-btn{width:100%;padding:10px;background:transparent;border:1px dashed #2a2a2a;border-radius:8px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;letter-spacing:.02em}
.new-alert-btn:hover{border-color:var(--orange-border);color:var(--orange)}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* STATS BAR */
.stats-bar{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0}
.stat{flex:1;padding:16px 20px;border-right:1px solid var(--border);position:relative}
.stat:last-child{border-right:none}
.stat-val{font-size:26px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1}
.stat-val.orange{color:var(--orange)}
.stat-label{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500}

/* CONTENT */
.content{flex:1;padding:20px}
.content-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.content-title{font-size:16px;font-weight:700;color:#fff}
.content-sub{font-size:12px;color:var(--muted);margin-top:2px}
.run-btn{background:var(--orange);color:#fff;font-weight:700;font-size:13px;border:none;border-radius:7px;padding:9px 18px;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:7px;transition:filter .15s}
.run-btn:hover{filter:brightness(1.1)}
.run-btn:disabled{background:#2a1a0a;color:#555;cursor:default;filter:none}

/* VEHICLE GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.vcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s;display:flex;flex-direction:column}
.vcard:hover{border-color:#333}
.vcard-img{width:100%;height:152px;object-fit:cover;background:var(--surface2);display:block}
.vcard-img-ph{width:100%;height:152px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:36px;color:#2a2a2a}
.vcard-body{padding:14px;flex:1;display:flex;flex-direction:column}
.vcard-title{font-size:13.5px;font-weight:700;color:#fff;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard-price{font-size:22px;font-weight:900;color:var(--orange);letter-spacing:-.5px;margin-bottom:8px}
.vcard-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.vtag{font-size:10.5px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:3px 7px;color:#999}
.vcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:10px;border-top:1px solid var(--border)}
.vsource{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.vscore{font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:4px}
.vscore.s-high{background:rgba(34,197,94,.12);color:var(--green)}
.vscore.s-mid{background:rgba(255,107,26,.12);color:var(--orange)}
.vscore.s-low{background:rgba(239,68,68,.12);color:var(--red)}
.vlink{font-size:12px;font-weight:700;color:var(--orange);text-decoration:none}
.vlink:hover{text-decoration:underline}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:60px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:20px;opacity:.3}
.empty h2{font-size:17px;font-weight:700;color:#444;margin-bottom:8px}
.empty p{font-size:13px;color:var(--muted)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:800;color:#fff;margin-bottom:20px;letter-spacing:-.3px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.frow.full{grid-template-columns:1fr}
.modal label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.modal input,.modal select{width:100%;padding:9px 12px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:7px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;transition:border-color .15s}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--orange-border)}
.modal select option{background:#1e1e1e}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.mbtn-primary{flex:1;padding:11px;background:var(--orange);color:#fff;font-weight:700;border:none;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px;transition:filter .15s}
.mbtn-primary:hover{filter:brightness(1.1)}
.mbtn-cancel{padding:11px 18px;background:transparent;color:var(--muted);border:1px solid #2a2a2a;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.mbtn-cancel:hover{color:#fff;border-color:#444}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:12px 18px;font-size:13px;font-weight:500;z-index:500;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
</style>
</head>
<body>

<nav>
  <div class="logo">Rate<span>Radar</span></div>
  <div id="trial-pill" class="trial-pill" style="display:none"></div>
  <button id="sub-btn" style="display:none" onclick="window.location='/subscribe'">Passer Pro ↗</button>
  <span class="nav-garage" id="nav-garage"></span>
  <a href="/logout" class="nav-out">Déconnexion</a>
</nav>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">Alertes</span>
    </div>
    <div class="sidebar-list" id="sidebar-list">
      <div style="font-size:12px;color:var(--muted);text-align:center;padding:30px 10px">Chargement...</div>
    </div>
    <div class="sidebar-footer">
      <button class="new-alert-btn" id="new-btn">+ Nouvelle alerte</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="stats-bar">
      <div class="stat"><div class="stat-val orange" id="s-total">—</div><div class="stat-label">Véhicules</div></div>
      <div class="stat"><div class="stat-val" id="s-alerts">—</div><div class="stat-label">Alertes actives</div></div>
      <div class="stat"><div class="stat-val" id="s-new">—</div><div class="stat-label">Nouvelles (24h)</div></div>
    </div>
    <div class="content">
      <div class="content-head">
        <div>
          <div class="content-title" id="c-title">Tous les véhicules</div>
          <div class="content-sub" id="c-sub"></div>
        </div>
        <button class="run-btn" id="run-btn">⚡ Scanner maintenant</button>
      </div>
      <div id="grid-wrap"></div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title">Nouvelle alerte</div>
    <form id="alert-form">
      <div class="frow full"><div><label>Nom de l'alerte</label><input type="text" name="name" placeholder="Ex: BMW Série 3 budget 18k" required></div></div>
      <div class="frow">
        <div><label>Marque</label><input type="text" name="brand" placeholder="BMW"></div>
        <div><label>Modèle</label><input type="text" name="model" placeholder="Série 3"></div>
      </div>
      <div class="frow">
        <div><label>Prix max (€)</label><input type="number" name="price_max" value="20000" min="1000" step="500"></div>
        <div><label>Km max</label><input type="number" name="km_max" value="150000" min="10000" step="10000"></div>
      </div>
      <div class="frow">
        <div><label>Année min</label><input type="number" name="year_min" value="2015" min="2000" max="2024"></div>
        <div><label>Carburant</label>
          <select name="fuel">
            <option value="">Tous</option>
            <option value="essence">Essence</option>
            <option value="diesel">Diesel</option>
            <option value="hybride">Hybride</option>
            <option value="electrique">Électrique</option>
          </select>
        </div>
      </div>
      <div class="modal-btns">
        <button type="button" class="mbtn-cancel" onclick="closeModal()">Annuler</button>
        <button type="submit" class="mbtn-primary">Créer l'alerte →</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let me = null, alerts = [], vehicles = [], activeId = null;

async function init() {
  const r = await fetch('/me');
  if (r.status === 401) { window.location = '/login'; return; }
  me = await r.json();

  document.getElementById('nav-garage').textContent = me.garage_name || me.email;

  if (me.subscription_status !== 'active') {
    if (me.trial_days_left > 0) {
      const p = document.getElementById('trial-pill');
      p.textContent = me.trial_days_left + 'j d\'essai';
      p.style.display = '';
    }
    document.getElementById('sub-btn').style.display = '';
  }

  if (!me.can_use) {
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.textContent = 'Essai expiré';
  }

  await loadAlerts();
  await loadVehicles(null);

  if (new URLSearchParams(location.search).get('subscribed') === '1') {
    toast('🎉 Abonnement Pro activé !');
    history.replaceState(null, '', '/dashboard');
  }
}

async function loadAlerts() {
  const r = await fetch('/alerts');
  alerts = await r.json();
  renderSidebar();
  document.getElementById('s-alerts').textContent = alerts.filter(a => a.active).length;
}

function renderSidebar() {
  const el = document.getElementById('sidebar-list');
  if (!alerts.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:30px 10px;line-height:1.6">Aucune alerte.<br>Créez-en une pour<br>commencer.</div>';
    return;
  }
  el.innerHTML = alerts.map(a => `
    <div class="alert-item ${activeId === a.id ? 'active' : ''}" onclick="selectAlert('${a.id}')">
      <div class="alert-name">
        <span class="a-dot ${a.active ? '' : 'off'}"></span>
        ${a.name || (a.brand + ' ' + a.model) || 'Alerte'}
      </div>
      <div class="alert-meta">${[a.brand, a.model].filter(Boolean).join(' ')} · max ${(a.price_max||0).toLocaleString('fr')}€</div>
      <div class="alert-actions">
        <button class="a-btn" onclick="event.stopPropagation();toggleAlert('${a.id}',${a.active})">${a.active ? 'Pause' : 'Activer'}</button>
        <button class="a-btn del" onclick="event.stopPropagation();deleteAlert('${a.id}')">Suppr.</button>
      </div>
    </div>
  `).join('');
}

async function selectAlert(id) {
  activeId = id;
  const a = alerts.find(x => x.id === id);
  document.getElementById('c-title').textContent = a ? (a.name || [a.brand, a.model].filter(Boolean).join(' ') || 'Alerte') : 'Tous les véhicules';
  renderSidebar();
  await loadVehicles(id);
}

async function loadVehicles(alertId) {
  const url = alertId ? `/vehicles?alert_id=${alertId}` : '/vehicles';
  const r = await fetch(url);
  vehicles = await r.json();
  renderGrid();
  document.getElementById('s-total').textContent = vehicles.length;
  const now = Date.now();
  const n24 = vehicles.filter(v => { try { return now - new Date(v.found_at).getTime() < 86400000; } catch { return false; } }).length;
  document.getElementById('s-new').textContent = n24;
  if (vehicles.length) document.getElementById('c-sub').textContent = vehicles.length + ' résultat' + (vehicles.length > 1 ? 's' : '');
  else document.getElementById('c-sub').textContent = '';
}

function renderGrid() {
  const el = document.getElementById('grid-wrap');
  if (!vehicles.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><h2>Aucun véhicule trouvé</h2><p>Lancez un scan ou attendez le rapport de demain matin.</p></div>';
    return;
  }
  el.innerHTML = '<div class="grid">' + vehicles.map(v => {
    const sc = v.score >= 130 ? 's-high' : v.score >= 100 ? 's-mid' : 's-low';
    const scLabel = v.score >= 130 ? '★ ' + v.score : v.score;
    const img = v.image_url
      ? `<img class="vcard-img" src="${v.image_url}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="vcard-img-ph" style="display:none">🚗</div>`
      : `<div class="vcard-img-ph">🚗</div>`;
    return `
      <div class="vcard">
        ${img}
        <div class="vcard-body">
          <div class="vcard-title" title="${v.title||''}">${v.title || 'Sans titre'}</div>
          <div class="vcard-price">${(v.price||0).toLocaleString('fr')} €</div>
          <div class="vcard-tags">
            ${v.location ? `<span class="vtag">📍 ${v.location}</span>` : ''}
            ${v.km ? `<span class="vtag">🛣 ${(v.km).toLocaleString('fr')} km</span>` : ''}
            ${v.year ? `<span class="vtag">📅 ${v.year}</span>` : ''}
          </div>
          <div class="vcard-foot">
            <span class="vsource">${v.source||''}</span>
            <span class="vscore ${sc}">Score ${scLabel}</span>
            <a class="vlink" href="${v.url}" target="_blank" rel="noopener">Voir →</a>
          </div>
        </div>
      </div>`;
  }).join('') + '</div>';
}

document.getElementById('run-btn').addEventListener('click', async () => {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Scan en cours...';
  try {
    const r = await fetch('/scrape/run', {method:'POST'});
    const d = await r.json();
    if (r.status === 402) toast('Essai expiré — passez Pro');
    else if (d.found === 0) toast('Aucun nouveau véhicule');
    else { toast(`✅ ${d.found} nouveau(x) véhicule(s)`); await loadVehicles(activeId); }
  } catch { toast('Erreur lors du scan'); }
  btn.disabled = !me?.can_use;
  btn.textContent = '⚡ Scanner maintenant';
});

document.getElementById('new-btn').addEventListener('click', () => document.getElementById('overlay').classList.add('open'));
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

document.getElementById('alert-form').addEventListener('submit', async e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  data.price_max = parseInt(data.price_max);
  data.km_max = parseInt(data.km_max);
  data.year_min = parseInt(data.year_min);
  const r = await fetch('/alerts', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
  if (r.status === 402) { toast('Essai expiré'); return; }
  const d = await r.json();
  if (d.id) { closeModal(); toast('Alerte créée !'); e.target.reset(); await loadAlerts(); }
});

async function toggleAlert(id, cur) {
  await fetch(`/alerts/${id}/toggle`, {method:'PATCH'});
  await loadAlerts();
}

async function deleteAlert(id) {
  if (!confirm('Supprimer cette alerte ?')) return;
  await fetch(`/alerts/${id}`, {method:'DELETE'});
  if (activeId === id) { activeId = null; document.getElementById('c-title').textContent = 'Tous les véhicules'; }
  await loadAlerts();
  await loadVehicles(null);
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

init();
</script>
</body>
</html>
