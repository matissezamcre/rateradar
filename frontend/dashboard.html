<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RateRadar — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--surface:#141414;--surface2:#191919;--border:#232323;
  --orange:#ff6b1a;--orange-dim:rgba(255,107,26,.1);--orange-border:rgba(255,107,26,.25);
  --text:#f0ede8;--muted:#666;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;height:52px;gap:12px;position:sticky;top:0;z-index:50}
.logo{font-size:17px;font-weight:900;letter-spacing:-.4px;margin-right:auto;color:#fff;text-decoration:none}
.logo span{color:var(--orange)}
.pro-badge{background:linear-gradient(135deg,#ff6b1a,#ff9a5c);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:4px;letter-spacing:.06em}
.trial-pill{background:var(--orange-dim);border:1px solid var(--orange-border);border-radius:4px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--orange)}
#sub-btn{background:var(--orange);color:#fff;font-weight:700;font-size:12px;border:none;border-radius:5px;padding:6px 12px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
#sub-btn:hover{filter:brightness(1.1)}
.nav-bell{position:relative;cursor:pointer;padding:6px;border-radius:6px;transition:background .15s;color:var(--muted);font-size:18px;line-height:1;border:none;background:transparent}
.nav-bell:hover{background:var(--surface2);color:var(--text)}
.bell-badge{position:absolute;top:2px;right:2px;background:var(--orange);color:#fff;font-size:9px;font-weight:800;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid var(--surface)}
.nav-garage{font-size:13px;color:var(--muted);font-weight:500;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-links{display:flex;gap:4px}
.nav-link{color:var(--muted);font-size:12px;text-decoration:none;padding:5px 10px;border-radius:5px;transition:all .15s}
.nav-link:hover{background:var(--surface2);color:var(--text)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 52px);overflow:hidden}

/* SIDEBAR */
.sidebar{width:258px;min-width:258px;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.all-btn{font-size:11px;color:var(--muted);background:transparent;border:none;cursor:pointer;padding:3px 8px;border-radius:4px;font-family:'Inter',sans-serif}
.all-btn:hover{color:var(--text);background:var(--surface2)}
.sidebar-list{flex:1;overflow-y:auto;padding:6px}
.alert-item{border-radius:8px;padding:10px 12px;cursor:pointer;transition:background .15s;margin-bottom:2px;border:1px solid transparent}
.alert-item:hover{background:var(--surface2)}
.alert-item.active{background:var(--orange-dim);border-color:var(--orange-border)}
.alert-name{font-size:13px;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px;margin-bottom:3px}
.a-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--green)}
.a-dot.off{background:#333}
.alert-meta{font-size:11px;color:var(--muted);padding-left:12px;line-height:1.5}
.alert-count{font-size:10px;font-weight:700;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1px 7px;color:var(--muted);margin-left:auto;flex-shrink:0}
.alert-actions{display:flex;gap:4px;margin-top:7px;padding-left:12px}
.a-btn{font-size:10px;font-weight:600;padding:3px 7px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.a-btn:hover{border-color:#555;color:var(--text)}
.a-btn.del:hover{border-color:var(--red);color:var(--red)}
.sidebar-footer{padding:10px}
.new-alert-btn{width:100%;padding:9px;background:transparent;border:1px dashed #2a2a2a;border-radius:8px;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.new-alert-btn:hover{border-color:var(--orange-border);color:var(--orange)}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* STATS BAR */
.stats-bar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.stat{flex:1;padding:14px 18px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-val{font-size:24px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1}
.stat-val.orange{color:var(--orange)}
.stat-val.green{color:var(--green)}
.stat-label{font-size:10px;color:var(--muted);margin-top:3px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}

/* TOOLBAR */
.toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0}
.toolbar-title{font-size:14px;font-weight:700;color:#fff;margin-right:4px}
.filter-select{padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--orange-border)}
.filter-select option{background:var(--surface2)}
.score-filter{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
.score-filter input{width:80px;accent-color:var(--orange)}
.filter-btn{padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s}
.filter-btn:hover,.filter-btn.active{border-color:var(--orange-border);color:var(--orange);background:var(--orange-dim)}
.run-btn{margin-left:auto;background:var(--orange);color:#fff;font-weight:700;font-size:12px;border:none;border-radius:6px;padding:7px 16px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap}
.run-btn:hover{filter:brightness(1.1)}
.run-btn:disabled{background:#2a1a0a;color:#555;cursor:default;filter:none}

/* CONTENT */
.content{flex:1;padding:16px}

/* BEST DEAL */
.best-deal{background:linear-gradient(135deg,rgba(255,107,26,.08),rgba(255,107,26,.03));border:1px solid var(--orange-border);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px}
.best-deal-badge{background:var(--orange);color:#fff;font-size:10px;font-weight:800;padding:3px 10px;border-radius:4px;white-space:nowrap;letter-spacing:.06em}
.best-deal-title{font-size:14px;font-weight:700;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.best-deal-price{font-size:20px;font-weight:900;color:var(--orange);white-space:nowrap}
.best-deal-score{font-size:11px;font-weight:700;background:rgba(34,197,94,.15);color:var(--green);padding:3px 8px;border-radius:4px;white-space:nowrap}
.best-deal-link{font-size:12px;font-weight:700;color:var(--orange);text-decoration:none;white-space:nowrap}
.best-deal-link:hover{text-decoration:underline}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(252px,1fr));gap:12px}
.vcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s;position:relative}
.vcard:hover{border-color:#333}
.vcard.favorited{border-color:rgba(245,158,11,.4)}
.vcard-img-wrap{position:relative}
.vcard-img{width:100%;height:145px;object-fit:cover;background:var(--surface2);display:block}
.vcard-img-ph{width:100%;height:145px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:34px;color:#2a2a2a}
.vcard-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.vcard:hover .vcard-actions{opacity:1}
.vcard-action{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);color:#fff;transition:background .15s}
.vcard-action:hover{background:rgba(0,0,0,.9)}
.vcard-action.fav-on{background:rgba(245,158,11,.8)}
.vcard-body{padding:12px;flex:1;display:flex;flex-direction:column}
.vcard-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vcard-price{font-size:21px;font-weight:900;color:var(--orange);letter-spacing:-.5px;margin-bottom:7px}
.vcard-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.vtag{font-size:10px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;color:#999}
.vcard-foot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:9px;border-top:1px solid var(--border)}
.vsource{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.vscore{font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px}
.vscore.s-high{background:rgba(34,197,94,.12);color:var(--green)}
.vscore.s-mid{background:rgba(255,107,26,.12);color:var(--orange)}
.vscore.s-low{background:rgba(239,68,68,.12);color:var(--red)}
.vlink{font-size:11px;font-weight:700;color:var(--orange);text-decoration:none}
.vlink:hover{text-decoration:underline}

/* CHART */
.chart-section{padding:0 16px 16px}
.chart-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.chart{display:flex;align-items:flex-end;gap:4px;height:60px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.chart-bar{background:var(--orange-dim);border:1px solid var(--orange-border);border-radius:3px 3px 0 0;width:100%;min-height:3px;transition:background .15s}
.chart-bar:hover{background:rgba(255,107,26,.3)}
.chart-label{font-size:8px;color:var(--muted);white-space:nowrap}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;text-align:center;flex:1}
.empty-icon{font-size:44px;margin-bottom:16px;opacity:.25}
.empty h2{font-size:16px;font-weight:700;color:#444;margin-bottom:6px}
.empty p{font-size:13px;color:var(--muted)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:26px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:800;color:#fff;margin-bottom:18px;letter-spacing:-.3px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.frow.full{grid-template-columns:1fr}
.modal label{display:block;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.modal input,.modal select{width:100%;padding:8px 11px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:6px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;transition:border-color .15s}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--orange-border)}
.modal select option{background:#1e1e1e}
.modal-btns{display:flex;gap:8px;margin-top:18px}
.mbtn-p{flex:1;padding:10px;background:var(--orange);color:#fff;font-weight:700;border:none;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px}
.mbtn-p:hover{filter:brightness(1.1)}
.mbtn-c{padding:10px 16px;background:transparent;color:var(--muted);border:1px solid #2a2a2a;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif}
.mbtn-c:hover{color:#fff;border-color:#444}

/* NOTIF PANEL */
.notif-panel{position:fixed;top:52px;right:0;width:320px;background:#161616;border-left:1px solid var(--border);border-bottom:1px solid var(--border);z-index:150;max-height:calc(100vh - 52px);overflow-y:auto;display:none}
.notif-panel.open{display:block}
.notif-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.notif-head-title{font-size:13px;font-weight:700;color:#fff}
.notif-mark{font-size:11px;color:var(--orange);background:transparent;border:none;cursor:pointer;font-family:'Inter',sans-serif}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--border);font-size:12px;line-height:1.5}
.notif-item.unread{background:rgba(255,107,26,.04)}
.notif-msg{color:var(--text)}
.notif-time{font-size:10px;color:var(--muted);margin-top:3px}
.notif-empty{padding:30px;text-align:center;font-size:13px;color:var(--muted)}

/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:11px 16px;font-size:13px;font-weight:500;z-index:500;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;max-width:300px}
.toast.show{opacity:1;transform:translateY(0)}

/* TUTORIAL OVERLAY */
.tut-overlay{position:fixed;inset:0;z-index:1000;pointer-events:none}
.tut-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000}
.tut-spotlight{position:fixed;z-index:1001;border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.7);pointer-events:none;transition:all .4s cubic-bezier(.4,0,.2,1)}
.tut-box{position:fixed;z-index:1002;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:20px;width:280px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.tut-step{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.tut-title{font-size:15px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-.2px}
.tut-desc{font-size:13px;color:#999;line-height:1.6;margin-bottom:16px}
.tut-btns{display:flex;gap:8px;justify-content:flex-end}
.tut-skip{font-size:12px;color:var(--muted);background:transparent;border:none;cursor:pointer;font-family:'Inter',sans-serif;padding:6px 10px}
.tut-skip:hover{color:var(--text)}
.tut-next{background:var(--orange);color:#fff;font-weight:700;font-size:13px;border:none;border-radius:7px;padding:8px 18px;cursor:pointer;font-family:'Inter',sans-serif}
.tut-next:hover{filter:brightness(1.1)}
.tut-dots{display:flex;gap:5px;margin-right:auto;align-items:center}
.tut-dot{width:6px;height:6px;border-radius:50%;background:#333;transition:background .2s}
.tut-dot.active{background:var(--orange)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">Rate<span>Radar</span></a>
  <span id="pro-badge" class="pro-badge" style="display:none">PRO</span>
  <span id="trial-pill" class="trial-pill" style="display:none"></span>
  <button id="sub-btn" style="display:none" onclick="window.location='/subscribe'">Passer Pro ↗</button>
  <button class="nav-bell" id="bell-btn" onclick="toggleNotifs()">🔔<span class="bell-badge" id="bell-badge" style="display:none"></span></button>
  <span class="nav-garage" id="nav-garage"></span>
  <div class="nav-links">
    <a href="/profile" class="nav-link">Mon profil</a>
    <a href="/admin" class="nav-link" id="admin-link" style="display:none">Admin</a>
    <a href="/logout" class="nav-link">Déco</a>
  </div>
</nav>

<!-- NOTIF PANEL -->
<div class="notif-panel" id="notif-panel">
  <div class="notif-head">
    <span class="notif-head-title">Notifications</span>
    <button class="notif-mark" onclick="markRead()">Tout marquer lu</button>
  </div>
  <div id="notif-list"></div>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-title">Alertes</span>
      <button class="all-btn" onclick="selectAlert(null)">Toutes</button>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
    <div class="sidebar-footer">
      <button class="new-alert-btn" id="new-btn">+ Nouvelle alerte</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-scroll">
    <div class="stats-bar">
      <div class="stat"><div class="stat-val orange" id="s-total">—</div><div class="stat-label">Véhicules</div></div>
      <div class="stat"><div class="stat-val" id="s-alerts">—</div><div class="stat-label">Alertes actives</div></div>
      <div class="stat"><div class="stat-val green" id="s-new">—</div><div class="stat-label">Nouveaux 24h</div></div>
      <div class="stat"><div class="stat-val" id="s-avg">—</div><div class="stat-label">Prix moyen</div></div>
    </div>

    <div class="toolbar">
      <span class="toolbar-title" id="c-title">Tous les véhicules</span>
      <select class="filter-select" id="f-source" onchange="applyFilters()">
        <option value="">Toutes sources</option>
        <option value="leboncoin">LeBonCoin</option>
        <option value="autoscout24">AutoScout24</option>
        <option value="lacentrale">La Centrale</option>
      </select>
      <select class="filter-select" id="f-sort" onchange="applyFilters()">
        <option value="score">Meilleur score</option>
        <option value="price_asc">Prix croissant</option>
        <option value="price_desc">Prix décroissant</option>
        <option value="km">Km croissant</option>
        <option value="date">Plus récent</option>
      </select>
      <div class="score-filter">
        <span>Score min</span>
        <input type="range" id="f-score" min="0" max="180" step="10" value="0" oninput="document.getElementById('f-score-val').textContent=this.value;applyFilters()">
        <span id="f-score-val">0</span>
      </div>
      <button class="filter-btn" id="fav-btn" onclick="toggleFavFilter()">⭐ Favoris</button>
      <button class="run-btn" id="run-btn">⚡ Scanner</button>
    </div>

    <div class="content">
      <div id="best-deal-wrap"></div>
      <div id="grid-wrap"></div>
    </div>

    <div class="chart-section" id="chart-section" style="display:none">
      <div class="chart-title">Véhicules trouvés — 14 derniers jours</div>
      <div class="chart" id="chart"></div>
    </div>
  </div>
</div>

<!-- MODAL ALERT -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nouvelle alerte</div>
    <form id="alert-form">
      <input type="hidden" id="edit-id">
      <div class="frow full"><div><label>Nom de l'alerte</label><input type="text" name="name" id="f-name" placeholder="Ex: BMW Série 3 budget 18k" required></div></div>
      <div class="frow">
        <div><label>Marque</label><input type="text" name="brand" id="f-brand" placeholder="BMW"></div>
        <div><label>Modèle</label><input type="text" name="model" id="f-model" placeholder="Série 3"></div>
      </div>
      <div class="frow">
        <div><label>Prix max (€)</label><input type="number" name="price_max" id="f-pmax" value="20000" min="1000" step="500"></div>
        <div><label>Km max</label><input type="number" name="km_max" id="f-km" value="150000" min="10000" step="10000"></div>
      </div>
      <div class="frow">
        <div><label>Année min</label><input type="number" name="year_min" id="f-year" value="2015" min="2000" max="2024"></div>
        <div><label>Fréquence</label>
          <select name="frequency" id="f-freq">
            <option value="daily">Quotidien</option>
            <option value="weekly">Hebdomadaire</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div><label>Région</label>
          <select name="region" id="f-region">
            <option value="France">🇫🇷 France (LBC + AS24 + La Centrale + L'Argus)</option>
            <option value="Belgique">🇧🇪 Belgique (AutoScout24.be)</option>
            <option value="Suisse">🇨🇭 Suisse (AutoScout24.ch)</option>
            <option value="Luxembourg">🇱🇺 Luxembourg (AutoScout24.lu)</option>
          </select>
        </div>
        <div><label>Heure d'alerte (Paris)</label>
          <select name="alert_hour" id="f-hour">
            <option value="6">6h00</option>
            <option value="7">7h00</option>
            <option value="8" selected>8h00</option>
            <option value="9">9h00</option>
            <option value="10">10h00</option>
            <option value="12">12h00</option>
            <option value="14">14h00</option>
            <option value="17">17h00</option>
            <option value="19">19h00</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div><label>Code postal (optionnel)</label><input type="text" name="zip" id="f-zip" placeholder="Ex: 69000, 1000, 75008"></div>
        <div><label>Rayon max</label>
          <select name="radius_km" id="f-radius">
            <option value="0">Toute la région</option>
            <option value="10">10 km</option>
            <option value="25">25 km</option>
            <option value="50" selected>50 km</option>
            <option value="100">100 km</option>
            <option value="200">200 km</option>
          </select>
        </div>
      </div>
      <div class="modal-btns">
        <button type="button" class="mbtn-c" onclick="closeModal()">Annuler</button>
        <button type="submit" class="mbtn-p" id="modal-submit">Créer l'alerte →</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- TUTORIAL -->
<div id="tut-spotlight" class="tut-spotlight" style="display:none"></div>
<div id="tut-box" class="tut-box" style="display:none"></div>

<script>
let me = null, alerts = [], vehicles = [], activeId = null;
let favOnly = false, editingId = null;
let tutStep = 0;

const TUT_STEPS = [
  {
    title: "Bienvenue sur RateRadar 🚗",
    desc: "RateRadar est votre assistant automatique pour trouver les meilleures occasions VO. Il surveille LBC, AutoScout24, La Centrale et L'Argus à votre place — 24h/24.",
    target: null,
    btnText: "Commencer →"
  },
  {
    title: "Étape 1 — Créez votre premier bot",
    desc: "Cliquez sur « + Nouvelle alerte » et configurez votre bot : marque, modèle, budget max, kilométrage, région. C'est votre robot de veille personnalisé.",
    target: "#new-btn",
    btnText: "Suivant"
  },
  {
    title: "Étape 2 — Choisissez votre heure",
    desc: "Chaque bot a une heure de réveil. Choisissez quand il vous contacte — 7h, 8h, 9h... Il tourne automatiquement chaque jour à cette heure.",
    target: "#new-btn",
    btnText: "Suivant"
  },
  {
    title: "Étape 3 — Score de pertinence",
    desc: "Chaque annonce reçoit un score sur 200. Plus c'est élevé, meilleure est l'affaire. Vert = top opportunité, orange = bonne affaire, gris = correct.",
    target: ".toolbar",
    btnText: "Suivant"
  },
  {
    title: "Étape 4 — Votre email chaque matin",
    desc: "À l'heure choisie, vous recevez un email avec les nouvelles annonces du jour : photo, prix, kilométrage, score, et lien direct. Vous n'avez plus rien à faire.",
    target: null,
    btnText: "Lancer mon premier bot 🚀"
  }
];

async function init() {
  const r = await fetch('/me');
  if (r.status === 401) { window.location = '/login'; return; }
  me = await r.json();

  document.getElementById('nav-garage').textContent = me.garage_name || me.email;
  if (['matisse.zamcre@gmail.com','matissezamcre@gmail.com'].includes(me.email))
    document.getElementById('admin-link').style.display = '';

  if (me.subscription_status === 'active') {
    document.getElementById('pro-badge').style.display = '';
  } else {
    if (me.trial_days_left > 0) {
      const p = document.getElementById('trial-pill');
      p.textContent = me.trial_days_left + 'j d\'essai';
      p.style.display = '';
    }
    document.getElementById('sub-btn').style.display = '';
  }

  if (!me.can_use) {
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.textContent = 'Essai expiré';
  } else if (me.plan_limits && !me.plan_limits.manual_scan) {
    const btn = document.getElementById('run-btn');
    btn.disabled = true;
    btn.title = 'Scan manuel non disponible en plan Starter';
    btn.textContent = '⚡ Pro uniquement';
  }

  updateBellBadge(me.unread_notifications);

  await loadAlerts();
  await loadVehicles();
  await loadChart();

  if (new URLSearchParams(location.search).get('subscribed') === '1') {
    toast('🎉 Abonnement Pro activé !');
    history.replaceState(null, '', '/dashboard');
  }

  if (new URLSearchParams(location.search).get('welcome') === '1') {
    history.replaceState(null, '', '/dashboard');
    setTimeout(() => startTutorial(), 800);
  }
}

// ── ALERTS ────────────────────────────────────────────────────────────────────

async function loadAlerts() {
  const r = await fetch('/alerts');
  alerts = await r.json();
  renderSidebar();
  document.getElementById('s-alerts').textContent = alerts.filter(a => a.active).length;
}

function renderSidebar() {
  const el = document.getElementById('sidebar-list');
  if (!alerts.length) {
    el.innerHTML = '<div style="font-size:12px;color:var(--muted);text-align:center;padding:24px 10px;line-height:1.7">Aucune alerte.<br>Créez-en une pour commencer.</div>';
    return;
  }
  el.innerHTML = alerts.map(a => {
    const lastScan = a.last_scan ? `Scan: ${timeAgo(a.last_scan)}` : 'Jamais scanné';
    return `
    <div class="alert-item ${activeId === a.id ? 'active' : ''}" onclick="selectAlert('${a.id}')">
      <div class="alert-name">
        <span class="a-dot ${a.active ? '' : 'off'}"></span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name || [a.brand,a.model].filter(Boolean).join(' ') || 'Alerte'}</span>
        <span class="alert-count">${a.vehicle_count||0}</span>
      </div>
      <div class="alert-meta">${[a.brand,a.model].filter(Boolean).join(' ')} · max ${(a.price_max||0).toLocaleString('fr')}€<br><span style="color:#3b82f6">🤖 Bot · ${a.alert_hour||8}h00 chaque jour</span> · ${lastScan}</div>
      <div class="alert-actions">
        <button class="a-btn" onclick="event.stopPropagation();editAlert('${a.id}')"">Éditer</button>
        <button class="a-btn" onclick="event.stopPropagation();toggleAlert('${a.id}',${a.active})">${a.active?'Pause':'Activer'}</button>
        <button class="a-btn del" onclick="event.stopPropagation();deleteAlert('${a.id}')">Suppr.</button>
      </div>
    </div>`;
  }).join('');
}

async function selectAlert(id) {
  activeId = id;
  const a = id ? alerts.find(x => x.id === id) : null;
  document.getElementById('c-title').textContent = a ? (a.name || [a.brand,a.model].filter(Boolean).join(' ') || 'Alerte') : 'Tous les véhicules';
  renderSidebar();
  await loadVehicles();
}

function editAlert(id) {
  const a = alerts.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Modifier l\'alerte';
  document.getElementById('modal-submit').textContent = 'Enregistrer';
  document.getElementById('f-name').value = a.name || '';
  document.getElementById('f-brand').value = a.brand || '';
  document.getElementById('f-model').value = a.model || '';
  document.getElementById('f-pmax').value = a.price_max || 20000;
  document.getElementById('f-km').value = a.km_max || 150000;
  document.getElementById('f-year').value = a.year_min || 2015;
  document.getElementById('f-freq').value = a.frequency || 'daily';
  document.getElementById('f-region').value = a.region || 'France';
  document.getElementById('f-zip').value = a.zip || '';
  document.getElementById('f-radius').value = a.radius_km || 0;
  document.getElementById('f-hour').value = a.alert_hour || 8;
  document.getElementById('overlay').classList.add('open');
}

async function toggleAlert(id, cur) {
  await fetch(`/alerts/${id}/toggle`, {method:'PATCH'});
  await loadAlerts();
}

async function deleteAlert(id) {
  if (!confirm('Supprimer cette alerte et tous ses véhicules ?')) return;
  await fetch(`/alerts/${id}`, {method:'DELETE'});
  if (activeId === id) { activeId = null; document.getElementById('c-title').textContent = 'Tous les véhicules'; }
  await loadAlerts();
  await loadVehicles();
}

document.getElementById('new-btn').addEventListener('click', () => {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Nouvelle alerte';
  document.getElementById('modal-submit').textContent = 'Créer l\'alerte →';
  document.getElementById('alert-form').reset();
  document.getElementById('overlay').classList.add('open');
});

function closeModal() { document.getElementById('overlay').classList.remove('open'); editingId = null; }
document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

document.getElementById('alert-form').addEventListener('submit', async e => {
  e.preventDefault();
  const data = {
    name: document.getElementById('f-name').value,
    brand: document.getElementById('f-brand').value,
    model: document.getElementById('f-model').value,
    price_max: parseInt(document.getElementById('f-pmax').value),
    km_max: parseInt(document.getElementById('f-km').value),
    year_min: parseInt(document.getElementById('f-year').value),
    frequency: document.getElementById('f-freq').value,
    region: document.getElementById('f-region').value,
    zip: document.getElementById('f-zip').value,
    radius_km: parseInt(document.getElementById('f-radius').value) || 0,
    alert_hour: parseInt(document.getElementById('f-hour').value) || 8,
  };
  let r;
  if (editingId) {
    r = await fetch(`/alerts/${editingId}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
    toast('Alerte mise à jour !');
  } else {
    r = await fetch('/alerts', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
    if (r.status === 402) { toast('Essai expiré'); return; }
    toast('Alerte créée !');
  }
  closeModal();
  await loadAlerts();
});

// ── VEHICLES ──────────────────────────────────────────────────────────────────

async function loadVehicles() {
  const source = document.getElementById('f-source').value;
  const sort   = document.getElementById('f-sort').value;
  const score  = document.getElementById('f-score').value;
  let url = '/vehicles?sort=' + sort + '&min_score=' + score;
  if (activeId) url += '&alert_id=' + activeId;
  if (source) url += '&source=' + source;
  if (favOnly) url += '&favorites=true';
  const r = await fetch(url);
  vehicles = await r.json();
  renderGrid();

  document.getElementById('s-total').textContent = vehicles.length;
  const now = Date.now();
  const n24 = vehicles.filter(v => { try { return now - new Date(v.found_at).getTime() < 86400000; } catch { return false; } }).length;
  document.getElementById('s-new').textContent = n24;
  const prices = vehicles.filter(v => v.price > 0).map(v => v.price);
  const avg = prices.length ? Math.round(prices.reduce((a,b) => a+b, 0) / prices.length) : 0;
  document.getElementById('s-avg').textContent = avg ? avg.toLocaleString('fr') + '€' : '—';

  await loadBestDeal();
}

function renderGrid() {
  const el = document.getElementById('grid-wrap');
  if (!vehicles.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><h2>Aucun véhicule trouvé</h2><p>Lancez un scan ou créez une alerte pour commencer.</p></div>';
    return;
  }
  el.innerHTML = '<div class="grid">' + vehicles.map(v => {
    const sc = v.score >= 130 ? 's-high' : v.score >= 100 ? 's-mid' : 's-low';
    const favClass = v.favorited ? 'fav-on' : '';
    const img = v.image_url
      ? `<img class="vcard-img" src="${v.image_url}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="vcard-img-ph" style="display:none">🚗</div>`
      : `<div class="vcard-img-ph">🚗</div>`;
    return `
      <div class="vcard ${v.favorited ? 'favorited' : ''}">
        <div class="vcard-img-wrap">
          ${img}
          <div class="vcard-actions">
            <button class="vcard-action ${favClass}" onclick="favVehicle('${v.id}',this)" title="Favori">⭐</button>
            <button class="vcard-action" onclick="hideVehicle('${v.id}',this)" title="Masquer">✕</button>
          </div>
        </div>
        <div class="vcard-body">
          <div class="vcard-title" title="${v.title||''}">${v.title||'Sans titre'}</div>
          <div class="vcard-price">${(v.price||0).toLocaleString('fr')} €</div>
          <div class="vcard-tags">
            ${v.location?`<span class="vtag">📍 ${v.location}</span>`:''}
            ${v.km?`<span class="vtag">🛣 ${v.km.toLocaleString('fr')} km</span>`:''}
            ${v.year?`<span class="vtag">📅 ${v.year}</span>`:''}
          </div>
          <div class="vcard-foot">
            <span class="vsource">${v.source||''}</span>
            <span class="vscore ${sc}">★ ${v.score}</span>
            <a class="vlink" href="${v.url}" target="_blank" rel="noopener">Voir →</a>
          </div>
        </div>
      </div>`;
  }).join('') + '</div>';
}

async function favVehicle(id, btn) {
  const r = await fetch(`/vehicles/${id}/favorite`, {method:'PATCH'});
  const d = await r.json();
  btn.classList.toggle('fav-on', d.favorited);
  btn.closest('.vcard').classList.toggle('favorited', d.favorited);
}

async function hideVehicle(id, btn) {
  btn.closest('.vcard').style.opacity = '0';
  btn.closest('.vcard').style.transform = 'scale(.95)';
  btn.closest('.vcard').style.transition = 'all .2s';
  setTimeout(async () => {
    await fetch(`/vehicles/${id}/hide`, {method:'PATCH'});
    await loadVehicles();
  }, 200);
}

async function loadBestDeal() {
  const r = await fetch('/stats/best-today');
  const v = await r.json();
  const el = document.getElementById('best-deal-wrap');
  if (!v.id) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="best-deal">
      <span class="best-deal-badge">🏆 MEILLEURE AFFAIRE DU JOUR</span>
      <span class="best-deal-title">${v.title||''}</span>
      <span class="best-deal-price">${(v.price||0).toLocaleString('fr')} €</span>
      <span class="best-deal-score">Score ${v.score}</span>
      <a class="best-deal-link" href="${v.url}" target="_blank">Voir →</a>
    </div>`;
}

function applyFilters() { loadVehicles(); }
function toggleFavFilter() {
  favOnly = !favOnly;
  document.getElementById('fav-btn').classList.toggle('active', favOnly);
  loadVehicles();
}

// ── CHART ─────────────────────────────────────────────────────────────────────

async function loadChart() {
  const r = await fetch('/stats/daily');
  const data = await r.json();
  if (!data.length) return;
  const section = document.getElementById('chart-section');
  section.style.display = '';
  const max = Math.max(...data.map(d => d.count), 1);
  document.getElementById('chart').innerHTML = data.map(d => {
    const h = Math.max(4, Math.round((d.count / max) * 56));
    const label = d.date.slice(5);
    return `<div class="chart-bar-wrap" title="${d.date}: ${d.count} véhicules">
      <div class="chart-bar" style="height:${h}px"></div>
      <div class="chart-label">${label}</div>
    </div>`;
  }).join('');
}

// ── SCAN ──────────────────────────────────────────────────────────────────────

document.getElementById('run-btn').addEventListener('click', async () => {
  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.textContent = '⏳ Scan...';
  try {
    const r = await fetch('/scrape/run', {method:'POST'});
    const d = await r.json();
    if (r.status === 402) toast('Essai expiré — passez Pro');
    else if (!d.found) toast('Aucun nouveau véhicule pour l\'instant');
    else { toast(`✅ ${d.found} nouveau(x) véhicule(s) !`); await loadVehicles(); await loadAlerts(); await loadChart(); updateBellBadge(1); }
  } catch { toast('Erreur lors du scan'); }
  btn.disabled = !me?.can_use;
  btn.textContent = '⚡ Scanner';
});

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────

function updateBellBadge(count) {
  const badge = document.getElementById('bell-badge');
  if (count > 0) { badge.textContent = count > 9 ? '9+' : count; badge.style.display = 'flex'; }
  else { badge.style.display = 'none'; }
}

async function toggleNotifs() {
  const panel = document.getElementById('notif-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    await loadNotifs();
    await markRead();
  }
}

async function loadNotifs() {
  const r = await fetch('/notifications');
  const notifs = await r.json();
  const el = document.getElementById('notif-list');
  if (!notifs.length) { el.innerHTML = '<div class="notif-empty">Aucune notification</div>'; return; }
  el.innerHTML = notifs.map(n => `
    <div class="notif-item ${n.read ? '' : 'unread'}">
      <div class="notif-msg">${n.message}</div>
      <div class="notif-time">${timeAgo(n.created_at)}</div>
    </div>`).join('');
}

async function markRead() {
  await fetch('/notifications/read', {method:'POST'});
  updateBellBadge(0);
}

document.addEventListener('click', e => {
  const panel = document.getElementById('notif-panel');
  if (panel.classList.contains('open') && !panel.contains(e.target) && e.target.id !== 'bell-btn') {
    panel.classList.remove('open');
  }
});

// ── TUTORIAL ──────────────────────────────────────────────────────────────────

function startTutorial() {
  tutStep = 0;
  showTutStep();
}

function showTutStep() {
  const step = TUT_STEPS[tutStep];
  const spotlight = document.getElementById('tut-spotlight');
  const box = document.getElementById('tut-box');

  spotlight.style.display = step.target ? 'block' : 'none';
  box.style.display = 'block';

  if (step.target) {
    const el = document.querySelector(step.target);
    if (el) {
      const rect = el.getBoundingClientRect();
      const pad = 8;
      spotlight.style.left = (rect.left - pad) + 'px';
      spotlight.style.top = (rect.top - pad) + 'px';
      spotlight.style.width = (rect.width + pad*2) + 'px';
      spotlight.style.height = (rect.height + pad*2) + 'px';
    }
  }
  // Box toujours centré — évite les débordements d'écran
  box.style.left = '50%';
  box.style.top = '50%';
  box.style.transform = 'translate(-50%, -50%)';

  const dots = TUT_STEPS.map((_, i) => `<div class="tut-dot ${i === tutStep ? 'active' : ''}"></div>`).join('');
  box.innerHTML = `
    <div class="tut-step">Étape ${tutStep + 1} / ${TUT_STEPS.length}</div>
    <div class="tut-title">${step.title}</div>
    <div class="tut-desc">${step.desc}</div>
    <div class="tut-btns">
      <div class="tut-dots">${dots}</div>
      <button class="tut-skip" onclick="endTutorial()">Passer</button>
      <button class="tut-next" onclick="nextTutStep()">${step.btnText}</button>
    </div>`;
}

function nextTutStep() {
  tutStep++;
  if (tutStep >= TUT_STEPS.length) { endTutorial(true); return; }
  const box = document.getElementById('tut-box');
  box.style.transform = '';
  showTutStep();
}

function endTutorial(openModal = false) {
  document.getElementById('tut-spotlight').style.display = 'none';
  document.getElementById('tut-box').style.display = 'none';
  if (openModal) {
    setTimeout(() => {
      document.getElementById('modal-title').textContent = 'Nouvelle alerte';
      document.getElementById('modal-submit').textContent = 'Créer l\'alerte →';
      document.getElementById('alert-form').reset();
      document.getElementById('overlay').classList.add('open');
    }, 300);
  }
}

// ── UTILS ─────────────────────────────────────────────────────────────────────

function timeAgo(dateStr) {
  try {
    const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
    if (diff < 60) return 'à l\'instant';
    if (diff < 3600) return Math.floor(diff/60) + 'min';
    if (diff < 86400) return Math.floor(diff/3600) + 'h';
    return Math.floor(diff/86400) + 'j';
  } catch { return ''; }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

init();
</script>
