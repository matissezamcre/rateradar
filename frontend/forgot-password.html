<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RateRadar — Mot de passe oublié</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#f1f1f1;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#141414;border:1px solid #222;border-radius:16px;padding:40px;width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:32px}
.logo span{font-size:22px;font-weight:700;color:#fff}
.logo span em{color:#ff6b1a;font-style:normal}
h1{font-size:20px;font-weight:600;text-align:center;margin-bottom:8px;color:#fff}
p{text-align:center;font-size:13px;color:#666;margin-bottom:24px}
label{display:block;font-size:13px;color:#888;margin-bottom:6px}
input{width:100%;padding:11px 14px;background:#1c1c1c;border:1px solid #2a2a2a;border-radius:8px;color:#f1f1f1;font-size:14px;font-family:'Inter',sans-serif;transition:border-color .2s}
input:focus{outline:none;border-color:#ff6b1a}
.field{margin-bottom:18px}
button{width:100%;padding:12px;background:#ff6b1a;color:#000;font-weight:600;font-size:15px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif}
.links{text-align:center;margin-top:20px;font-size:13px;color:#666}
.links a{color:#ff6b1a;text-decoration:none}
.msg{border-radius:8px;padding:12px 14px;font-size:13px;margin-bottom:16px;display:none}
.msg.ok{background:#0a2a1a;border:1px solid #1a5a2a;color:#6ee7b7}
.msg.err{background:#2a1010;border:1px solid #5a2020;color:#f87171}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>Rate<em>Radar</em></span></div>
  <h1>Mot de passe oublié</h1>
  <p>Entrez votre email, vous recevrez un lien de réinitialisation.</p>
  <div class="msg" id="msg"></div>
  <form id="form">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="garage@exemple.fr" required>
    </div>
    <button type="submit">Envoyer le lien</button>
  </form>
  <div class="links"><a href="/login">← Retour à la connexion</a></div>
</div>
<script>
document.getElementById('form').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const r = await fetch('/forgot-password', {method:'POST', body: fd});
  const d = await r.json();
  const msg = document.getElementById('msg');
  if (d.reset_url) {
    msg.className = 'msg ok';
    msg.textContent = 'Lien envoyé ! (dev: ' + d.reset_url + ')';
  } else {
    msg.className = 'msg err';
    msg.textContent = d.error || 'Erreur';
  }
  msg.style.display = 'block';
});
</script>
</body>
</html>
